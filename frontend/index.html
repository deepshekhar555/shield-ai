<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shield AI — Launching...</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        :root {
            --primary: #6366f1;
            --bg: #030712;
            --text: #f8fafc;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        
        .logo-box { position: relative; width: 140px; height: 140px; margin-bottom: 48px; border-radius: 40px; overflow: hidden; box-shadow: 0 0 50px rgba(99, 102, 241, 0.4); animation: logo-bloom 1.5s ease-out; }
        .logo-img { width: 100%; height: 100%; object-fit: cover; }
        
        @keyframes logo-bloom {
            0% { transform: scale(0.8) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .loader-container { width: 220px; text-align: center; }
        .loader-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; position: relative; overflow: hidden; margin-bottom: 12px; }
        .loader-progress { position: absolute; height: 100%; width: 50%; background: var(--primary); border-radius: 10px; animation: loading 2.5s infinite ease-in-out; }
        
        @keyframes loading {
            0% { left: -50%; width: 30%; }
            50% { left: 40%; width: 60%; }
            100% { left: 100%; width: 30%; }
        }

        .status { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--primary); opacity: 0.8; }
    </style>
</head>
<body>
    <div class="logo-box">
        <img src="shield_logo.png" alt="Shield AI" class="logo-img">
    </div>
    
    <div class="loader-container">
        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>
        <p class="status" id="statTxt">Syncing AI Brain...</p>
    </div>

    <script>
        const texts = ["Initiating Shield...", "Syncing AI Cluster...", "Securing Neural Nodes...", "Vault Handshake..."];
        let i = 0;
        setInterval(() => {
            i = (i + 1) % texts.length;
            document.getElementById('statTxt').innerText = texts[i];
        }, 600);

        setTimeout(() => {
            const token = localStorage.getItem('shield_token');
            window.location.href = token ? 'dashboard.html' : 'login.html';
        }, 2800);

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
